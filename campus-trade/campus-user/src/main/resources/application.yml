server:
  port: 8081

spring:
  application:
    name: campus-user
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/campus_trade?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: campus
    password: ${SPRING_DATASOURCE_PASSWORD:}
  cloud:
    nacos:
      discovery:
        server-addr: ${SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR:localhost:8848}

campus:
  internal-api-token: ${INTERNAL_API_TOKEN:}

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto

logging:
  level:
    com.campus: ${LOGGING_LEVEL_COM_CAMPUS:INFO}

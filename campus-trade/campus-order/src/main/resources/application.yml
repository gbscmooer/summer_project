server:
  port: 8083
spring:
  application:
    name: campus-order
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/campus_trade?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: campus
    password: ${SPRING_DATASOURCE_PASSWORD:}
  rabbitmq:
    host: ${SPRING_RABBITMQ_HOST:localhost}
    port: ${SPRING_RABBITMQ_PORT:5672}
    username: ${SPRING_RABBITMQ_USERNAME:}
    password: ${SPRING_RABBITMQ_PASSWORD:}
    listener:
      simple:
        retry:
          enabled: true
          max-attempts: 3
        default-requeue-rejected: false
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      password: ${SPRING_DATA_REDIS_PASSWORD:}
  cloud:
    nacos:
      discovery:
        server-addr: ${SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR:localhost:8848}
    openfeign:
      client:
        config:
          default:
            connectTimeout: 5000
            readTimeout: 10000
campus:
  internal-api-token: ${INTERNAL_API_TOKEN:}
  order:
    # 未支付订单超时自动关单（分钟）
    unpaid-timeout-minutes: ${CAMPUS_ORDER_UNPAID_TIMEOUT_MINUTES:15}
    # 超时关单扫描间隔（毫秒，fixedDelay：上次结束后再等）
    timeout-scan-delay-ms: ${CAMPUS_ORDER_TIMEOUT_SCAN_DELAY_MS:60000}
    # 每次扫描最多处理的订单数，避免一次扫全表
    timeout-batch-size: ${CAMPUS_ORDER_TIMEOUT_BATCH_SIZE:100}
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto
logging:
  level:
    com.campus: ${LOGGING_LEVEL_COM_CAMPUS:INFO}

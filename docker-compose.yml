x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

services:
  # ==========================================
  # 1. Middleware Services
  # ==========================================
  nacos:
    logging: *default-logging
    image: nacos/nacos-server:v2.3.2
    platform: linux/amd64
    container_name: campus-nacos
    environment:
      - MODE=standalone
      - PREFER_HOST_MODE=hostname
    volumes:
      - nacos-data:/home/nacos/data
    networks:
      - service-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8848/nacos/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  mysql:
    logging: *default-logging
    image: mysql:8.0
    container_name: campus-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD is required}
      MYSQL_DATABASE: campus_trade
      MYSQL_USER: campus
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?MYSQL_PASSWORD is required}
      TZ: Asia/Shanghai
    volumes:
      - mysql-data:/var/lib/mysql
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --default-authentication-plugin=mysql_native_password
    networks:
      - data-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "MYSQL_PWD=$$MYSQL_ROOT_PASSWORD mysqladmin ping -h localhost -uroot --silent"]
      interval: 30s
      timeout: 10s
      retries: 5

  redis:
    logging: *default-logging
    image: redis:7.2
    container_name: campus-redis
    volumes:
      - redis-data:/data
    command: ["sh", "-c", "exec redis-server --appendonly yes --requirepass \"$$REDIS_PASSWORD\""]
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
    networks:
      - data-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$$REDIS_PASSWORD\" --no-auth-warning ping | grep -q PONG"]
      interval: 30s
      timeout: 10s
      retries: 3

  elasticsearch:
    logging: *default-logging
    image: elasticsearch:8.13.0
    container_name: campus-es
    environment:
      - discovery.type=single-node
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
      - xpack.security.enabled=false
      - xpack.security.http.ssl.enabled=false
      - xpack.security.transport.ssl.enabled=false
    volumes:
      - es-data:/usr/share/elasticsearch/data
    networks:
      - data-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9200/_cluster/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  rabbitmq:
    logging: *default-logging
    image: rabbitmq:3.13-management
    container_name: campus-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USERNAME:?RABBITMQ_USERNAME is required}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:?RABBITMQ_PASSWORD is required}
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks:
      - data-net
    restart: unless-stopped
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 30s
      timeout: 10s
      retries: 5

  # ==========================================
  # 2. Application Services
  # ==========================================
  campus-gateway:
    logging: *default-logging
    read_only: true
    tmpfs: [/tmp]
    security_opt: [no-new-privileges:true]
    cap_drop: [ALL]
    build: ./campus-trade/campus-gateway
    container_name: campus-gateway
    environment:
      - SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR=campus-nacos:8848
      - SPRING_CLOUD_INETUTILS_PREFERRED_NETWORKS=172.20
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET is required and must be at least 32 bytes}
      - JWT_EXPIRATION_MINUTES=${JWT_EXPIRATION_MINUTES:-120}
      - INTERNAL_API_TOKEN=${INTERNAL_API_TOKEN:?INTERNAL_API_TOKEN is required and must be at least 32 bytes}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-}
      - JAVA_OPTS=-Xms256m -Xmx256m
    depends_on:
      nacos:
        condition: service_healthy
    networks:
      - edge-net
      - service-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 8080 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

  campus-user:
    logging: *default-logging
    read_only: true
    tmpfs: [/tmp]
    security_opt: [no-new-privileges:true]
    cap_drop: [ALL]
    build: ./campus-trade/campus-user
    container_name: campus-user
    environment:
      - SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR=campus-nacos:8848
      - SPRING_CLOUD_INETUTILS_PREFERRED_NETWORKS=172.20
      - SPRING_DATASOURCE_URL=jdbc:mysql://campus-mysql:3306/campus_trade?useUnicode=true&characterEncoding=UTF-8&connectionCollation=utf8mb4_unicode_ci&serverTimezone=Asia/Shanghai
      - SPRING_DATASOURCE_USERNAME=campus
      - SPRING_DATASOURCE_PASSWORD=${MYSQL_PASSWORD:?MYSQL_PASSWORD is required}
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET is required and must be at least 32 bytes}
      - JWT_EXPIRATION_MINUTES=${JWT_EXPIRATION_MINUTES:-120}
      - INTERNAL_API_TOKEN=${INTERNAL_API_TOKEN:?INTERNAL_API_TOKEN is required and must be at least 32 bytes}
      - RESEND_API_KEY=${RESEND_API_KEY:-}
      - RESEND_FROM=${RESEND_FROM:-onboarding@resend.dev}
      - PUBLIC_BASE_URL=${PUBLIC_BASE_URL:-http://127.0.0.1:8080}
      - JAVA_OPTS=-Xms256m -Xmx256m
    depends_on:
      nacos:
        condition: service_healthy
      mysql:
        condition: service_healthy
    networks:
      - service-net
      - data-net
      - egress-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 8081 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

  product-images-init:
    image: amazoncorretto:17-alpine@sha256:223ebda8690566648f5cc77a69d661ecf7c35a9f977fd7cbf0d19545491ad1c6
    logging: *default-logging
    user: "0:0"
    entrypoint: ["/bin/chown", "-R", "10001:10001", "/data/product-images"]
    network_mode: none
    read_only: true
    security_opt: [no-new-privileges:true]
    cap_drop: [ALL]
    cap_add: [CHOWN]
    volumes:
      - product-images:/data/product-images
    restart: "no"

  campus-product:
    logging: *default-logging
    read_only: true
    tmpfs: [/tmp]
    security_opt: [no-new-privileges:true]
    cap_drop: [ALL]
    build: ./campus-trade/campus-product
    container_name: campus-product
    environment:
      - SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR=campus-nacos:8848
      - SPRING_CLOUD_INETUTILS_PREFERRED_NETWORKS=172.20
      - SPRING_DATASOURCE_URL=jdbc:mysql://campus-mysql:3306/campus_trade?useUnicode=true&characterEncoding=UTF-8&connectionCollation=utf8mb4_unicode_ci&serverTimezone=Asia/Shanghai
      - SPRING_DATASOURCE_USERNAME=campus
      - SPRING_DATASOURCE_PASSWORD=${MYSQL_PASSWORD:?MYSQL_PASSWORD is required}
      - SPRING_DATA_REDIS_HOST=campus-redis
      - SPRING_DATA_REDIS_PASSWORD=${REDIS_PASSWORD:?REDIS_PASSWORD is required}
      - SPRING_ELASTICSEARCH_URIS=http://campus-es:9200
      - INTERNAL_API_TOKEN=${INTERNAL_API_TOKEN:?INTERNAL_API_TOKEN is required and must be at least 32 bytes}
      - AI_API_KEY=${AI_API_KEY:-}
      - AI_BASE_URL=${AI_BASE_URL:-https://api.openai.com/v1}
      - AI_MODEL=${AI_MODEL:-gpt-4.1-mini}
      - AI_SUPPORTS_VISION=${AI_SUPPORTS_VISION:-true}
      - AI_TIMEOUT_SECONDS=${AI_TIMEOUT_SECONDS:-60}
      - AI_DAILY_USER_LIMIT=${AI_DAILY_USER_LIMIT:-100}
      - AI_GLOBAL_CONCURRENCY=${AI_GLOBAL_CONCURRENCY:-8}
      - AI_CONFIG_ENCRYPTION_KEY=${AI_CONFIG_ENCRYPTION_KEY:?AI_CONFIG_ENCRYPTION_KEY is required and must be at least 32 bytes}
      - PRODUCT_IMAGE_DIR=/data/product-images
      - PRODUCT_REINDEX_ON_STARTUP=false
      - JAVA_OPTS=-Xms256m -Xmx256m
    volumes:
      - product-images:/data/product-images
    depends_on:
      nacos:
        condition: service_healthy
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      product-images-init:
        condition: service_completed_successfully
    networks:
      - service-net
      - data-net
      - egress-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 8082 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

  campus-order:
    logging: *default-logging
    read_only: true
    tmpfs: [/tmp]
    security_opt: [no-new-privileges:true]
    cap_drop: [ALL]
    build: ./campus-trade/campus-order
    container_name: campus-order
    environment:
      - SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR=campus-nacos:8848
      - SPRING_CLOUD_INETUTILS_PREFERRED_NETWORKS=172.20
      - SPRING_DATASOURCE_URL=jdbc:mysql://campus-mysql:3306/campus_trade?useUnicode=true&characterEncoding=UTF-8&connectionCollation=utf8mb4_unicode_ci&serverTimezone=Asia/Shanghai
      - SPRING_DATASOURCE_USERNAME=campus
      - SPRING_DATASOURCE_PASSWORD=${MYSQL_PASSWORD:?MYSQL_PASSWORD is required}
      - SPRING_DATA_REDIS_HOST=campus-redis
      - SPRING_DATA_REDIS_PASSWORD=${REDIS_PASSWORD:?REDIS_PASSWORD is required}
      - SPRING_RABBITMQ_HOST=campus-rabbitmq
      - SPRING_RABBITMQ_USERNAME=${RABBITMQ_USERNAME:?RABBITMQ_USERNAME is required}
      - SPRING_RABBITMQ_PASSWORD=${RABBITMQ_PASSWORD:?RABBITMQ_PASSWORD is required}
      - INTERNAL_API_TOKEN=${INTERNAL_API_TOKEN:?INTERNAL_API_TOKEN is required and must be at least 32 bytes}
      - JAVA_OPTS=-Xms256m -Xmx256m
    depends_on:
      nacos:
        condition: service_healthy
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - service-net
      - data-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 8083 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

  campus-web:
    logging: *default-logging
    read_only: true
    tmpfs:
      - /tmp
      - /var/cache/nginx:uid=101,gid=101,mode=0755
    security_opt: [no-new-privileges:true]
    cap_drop: [ALL]
    build: ./campus-trade-web
    container_name: campus-web
    environment:
      TRUSTED_PROXY_CIDR: ${TRUSTED_PROXY_CIDR:?TRUSTED_PROXY_CIDR is required}
    ports:
      - "${WEB_BIND_ADDRESS:-127.0.0.1}:${WEB_PORT:-8080}:8080"
    depends_on:
      campus-gateway:
        condition: service_healthy
    networks:
      - edge-net
    restart: unless-stopped

networks:
  edge-net:
    driver: bridge
  service-net:
    driver: bridge
    internal: true
  data-net:
    driver: bridge
    internal: true
  egress-net:
    driver: bridge

volumes:
  nacos-data:
  mysql-data:
  redis-data:
  es-data:
  rabbitmq-data:
  product-images:

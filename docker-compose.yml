version: '3.8'

services:
  # ==========================================
  # 1. Middleware Services
  # ==========================================
  nacos:
    image: nacos/nacos-server:v2.3.2
    container_name: campus-nacos
    environment:
      - MODE=standalone
      - PREFER_HOST_MODE=hostname
      - SPRING_DATASOURCE_PLATFORM=embedded
    ports:
      - "8848:8848"
      - "9848:9848"
    volumes:
      - nacos-data:/home/nacos/data
    networks:
      - campus-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8848/nacos/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  mysql:
    image: mysql:8.0
    container_name: campus-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: campus_trade
      MYSQL_USER: campus
      MYSQL_PASSWORD: campus123
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --default-authentication-plugin=mysql_native_password
    networks:
      - campus-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot123"]
      interval: 30s
      timeout: 10s
      retries: 5

  redis:
    image: redis:7.2
    container_name: campus-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    networks:
      - campus-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  elasticsearch:
    image: elasticsearch:8.13.0
    container_name: campus-es
    environment:
      - discovery.type=single-node
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
      - xpack.security.enabled=false
      - xpack.security.http.ssl.enabled=false
      - xpack.security.transport.ssl.enabled=false
    ports:
      - "9200:9200"
      - "9300:9300"
    volumes:
      - es-data:/usr/share/elasticsearch/data
    networks:
      - campus-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9200/_cluster/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: campus-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks:
      - campus-net
    restart: unless-stopped
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 30s
      timeout: 10s
      retries: 5

  # ==========================================
  # 2. Application Services
  # ==========================================
  campus-gateway:
    build: ./campus-trade/campus-gateway
    container_name: campus-gateway
    ports:
      - "8080:8080"
    environment:
      - SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR=campus-nacos:8848
      - JAVA_OPTS=-Xms256m -Xmx256m
    depends_on:
      nacos:
        condition: service_healthy
    networks:
      - campus-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 8080 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

  campus-user:
    build: ./campus-trade/campus-user
    container_name: campus-user
    ports:
      - "8081:8081"
    environment:
      - SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR=campus-nacos:8848
      - SPRING_DATASOURCE_URL=jdbc:mysql://campus-mysql:3306/campus_trade?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
      - SPRING_DATASOURCE_USERNAME=campus
      - SPRING_DATASOURCE_PASSWORD=campus123
      - JAVA_OPTS=-Xms256m -Xmx256m
    depends_on:
      nacos:
        condition: service_healthy
      mysql:
        condition: service_healthy
    networks:
      - campus-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 8081 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

  campus-product:
    build: ./campus-trade/campus-product
    container_name: campus-product
    ports:
      - "8082:8082"
    environment:
      - SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR=campus-nacos:8848
      - SPRING_DATASOURCE_URL=jdbc:mysql://campus-mysql:3306/campus_trade?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
      - SPRING_DATASOURCE_USERNAME=campus
      - SPRING_DATASOURCE_PASSWORD=campus123
      - SPRING_DATA_REDIS_HOST=campus-redis
      - SPRING_ELASTICSEARCH_URIS=http://campus-es:9200
      - JAVA_OPTS=-Xms256m -Xmx256m
    depends_on:
      nacos:
        condition: service_healthy
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    networks:
      - campus-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 8082 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

  campus-order:
    build: ./campus-trade/campus-order
    container_name: campus-order
    ports:
      - "8083:8083"
    environment:
      - SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR=campus-nacos:8848
      - SPRING_DATASOURCE_URL=jdbc:mysql://campus-mysql:3306/campus_trade?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
      - SPRING_DATASOURCE_USERNAME=campus
      - SPRING_DATASOURCE_PASSWORD=campus123
      - SPRING_DATA_REDIS_HOST=campus-redis
      - SPRING_RABBITMQ_HOST=campus-rabbitmq
      - JAVA_OPTS=-Xms256m -Xmx256m
    depends_on:
      nacos:
        condition: service_healthy
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - campus-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 8083 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

  campus-web:
    build: ./campus-trade-web
    container_name: campus-web
    ports:
      - "80:80"
    depends_on:
      campus-gateway:
        condition: service_healthy
    networks:
      - campus-net
    restart: unless-stopped

networks:
  campus-net:
    driver: bridge

volumes:
  nacos-data:
  mysql-data:
  redis-data:
  es-data:
  rabbitmq-data:

# Node8 data-replica: MySQL 从库 + Redis 从 + Sentinel-2
# 用法：docker compose -f docker-compose.data-replica.yml --env-file .env up -d
# 随后在本机执行：./scripts/setup-replication.sh
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

services:
  mysql-replica:
    logging: *default-logging
    image: mysql:8.0
    container_name: campus-mysql-replica
    environment:
      # 从库不本地建库/用户，避免与主库 GTID 冲突；由复制同步
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD is required}
      MYSQL_ROOT_HOST: "%"
      TZ: Asia/Shanghai
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      # 与 data-primary 一致：落数据盘 bind mount。命名卷会忽略 DATA_*_DIR，
      # 答辩机根盘易满，且 docker compose down -v 会误删从库数据。
      - ${DATA_MYSQL_DIR:-/data/mysql}:/var/lib/mysql
      - ./mysql/replica.cnf:/etc/mysql/conf.d/replica.cnf:ro
    # 首次初始化勿带 read_only（官方 entrypoint 临时实例也会吃 command，导致无法设 root 密码）。
    # 只读在容器就绪后由 scripts/enable-mysql-readonly.sh / setup-replication.sh 打开。
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --default-authentication-plugin=mysql_native_password
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "MYSQL_PWD=$$MYSQL_ROOT_PASSWORD mysqladmin ping -h localhost -uroot --silent"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 60s

  redis-replica:
    logging: *default-logging
    image: redis:7.2
    container_name: campus-redis-replica
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
      REDIS_PRIMARY_HOST: ${REDIS_PRIMARY_HOST:?REDIS_PRIMARY_HOST is required}
    command:
      - sh
      - -c
      - |
        exec redis-server \
          --appendonly yes \
          --requirepass "$$REDIS_PASSWORD" \
          --masterauth "$$REDIS_PASSWORD" \
          --replicaof "$$REDIS_PRIMARY_HOST" 6379 \
          --replica-read-only yes
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - ${DATA_REDIS_DIR:-/data/redis}:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$$REDIS_PASSWORD\" --no-auth-warning ping | grep -q PONG"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 20s

  redis-sentinel-2:
    logging: *default-logging
    image: redis:7.2
    container_name: campus-redis-sentinel-2
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
      REDIS_PRIMARY_HOST: ${REDIS_PRIMARY_HOST:?REDIS_PRIMARY_HOST is required}
      REDIS_SENTINEL_MASTER_NAME: ${REDIS_SENTINEL_MASTER_NAME:-campus-redis}
    command:
      - sh
      - -c
      - |
        cat > /tmp/sentinel.conf <<EOF
        port 26379
        dir /tmp
        sentinel resolve-hostnames yes
        sentinel monitor $$REDIS_SENTINEL_MASTER_NAME $$REDIS_PRIMARY_HOST 6379 2
        sentinel auth-pass $$REDIS_SENTINEL_MASTER_NAME $$REDIS_PASSWORD
        sentinel down-after-milliseconds $$REDIS_SENTINEL_MASTER_NAME 5000
        sentinel failover-timeout $$REDIS_SENTINEL_MASTER_NAME 60000
        sentinel parallel-syncs $$REDIS_SENTINEL_MASTER_NAME 1
        EOF
        exec redis-sentinel /tmp/sentinel.conf
    ports:
      - "26379:26379"
    depends_on:
      redis-replica:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -p 26379 ping | grep -q PONG"]
      interval: 20s
      timeout: 5s
      retries: 5

# Node7 data-primary: MySQL 主 + Redis 主 + Sentinel-1
# 用法：docker compose -f docker-compose.data-primary.yml --env-file .env up -d
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

services:
  mysql-primary:
    logging: *default-logging
    image: mysql:8.0
    container_name: campus-mysql-primary
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD is required}
      MYSQL_DATABASE: campus_trade
      MYSQL_USER: campus
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?MYSQL_PASSWORD is required}
      MYSQL_REPLICATION_PASSWORD: ${MYSQL_REPLICATION_PASSWORD:?MYSQL_REPLICATION_PASSWORD is required}
      TZ: Asia/Shanghai
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql-primary-data:/var/lib/mysql
      - ./mysql/primary.cnf:/etc/mysql/conf.d/primary.cnf:ro
      - ../../sql/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
      - ./mysql/init-replication-user.sh:/docker-entrypoint-initdb.d/02-replication-user.sh:ro
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --default-authentication-plugin=mysql_native_password
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "MYSQL_PWD=$$MYSQL_ROOT_PASSWORD mysqladmin ping -h localhost -uroot --silent"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 60s

  redis-master:
    logging: *default-logging
    image: redis:7.2
    container_name: campus-redis-master
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
    command: ["sh", "-c", "exec redis-server --appendonly yes --requirepass \"$$REDIS_PASSWORD\""]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-master-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$$REDIS_PASSWORD\" --no-auth-warning ping | grep -q PONG"]
      interval: 20s
      timeout: 5s
      retries: 5

  redis-sentinel-1:
    logging: *default-logging
    image: redis:7.2
    container_name: campus-redis-sentinel-1
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
      HOST_IP: ${HOST_IP:?HOST_IP is required}
      # Must match data-replica sentinel (default mymaster); quorum=2 needs a shared name.
      REDIS_SENTINEL_MASTER_NAME: ${REDIS_SENTINEL_MASTER_NAME:-mymaster}
    command:
      - sh
      - -c
      - |
        cat > /tmp/sentinel.conf <<EOF
        port 26379
        dir /tmp
        sentinel resolve-hostnames yes
        sentinel monitor $$REDIS_SENTINEL_MASTER_NAME $$HOST_IP 6379 2
        sentinel auth-pass $$REDIS_SENTINEL_MASTER_NAME $$REDIS_PASSWORD
        sentinel down-after-milliseconds $$REDIS_SENTINEL_MASTER_NAME 5000
        sentinel failover-timeout $$REDIS_SENTINEL_MASTER_NAME 60000
        sentinel parallel-syncs $$REDIS_SENTINEL_MASTER_NAME 1
        EOF
        exec redis-sentinel /tmp/sentinel.conf
    ports:
      - "26379:26379"
    depends_on:
      redis-master:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -p 26379 ping | grep -q PONG"]
      interval: 20s
      timeout: 5s
      retries: 5

volumes:
  mysql-primary-data:
  redis-master-data:

# Node7 数据主：MySQL Primary + Redis Master + Sentinel-1
# 用法：docker compose -f docker-compose.data-primary.yml --env-file .env up -d
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

services:
  mysql-primary:
    logging: *default-logging
    image: mysql:8.0
    container_name: campus-mysql-primary
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD is required}
      MYSQL_DATABASE: campus_trade
      MYSQL_USER: campus
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?MYSQL_PASSWORD is required}
      TZ: Asia/Shanghai
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - ${DATA_MYSQL_DIR:-/data/mysql}:/var/lib/mysql
      - ./mysql/primary.cnf:/etc/mysql/conf.d/primary.cnf:ro
      - ../../sql/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    command: ["mysqld"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "MYSQL_PWD=$$MYSQL_ROOT_PASSWORD mysqladmin ping -h localhost -uroot --silent"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

  redis-master:
    logging: *default-logging
    image: redis:7.2
    container_name: campus-redis-master
    command:
      - sh
      - -c
      - |
        exec redis-server \
          --appendonly yes \
          --appendfsync everysec \
          --requirepass "$$REDIS_PASSWORD" \
          --masterauth "$$REDIS_PASSWORD" \
          --bind 0.0.0.0 \
          --protected-mode yes
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - ${DATA_REDIS_DIR:-/data/redis}:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$$REDIS_PASSWORD\" --no-auth-warning ping | grep -q PONG"]
      interval: 15s
      timeout: 5s
      retries: 5

  # Sentinel-1（Data-Main）。当前仅 2 个 Sentinel，应用仍直连 Redis Master，未接入 Sentinel。
  redis-sentinel-1:
    logging: *default-logging
    image: redis:7.2
    container_name: campus-redis-sentinel-1
    depends_on:
      redis-master:
        condition: service_healthy
    command:
      - sh
      - -c
      - |
        conf=/tmp/sentinel.conf
        cat > "$$conf" <<EOF
        port 26379
        dir /tmp
        sentinel monitor campus-redis $${HOST_IP} 6379 2
        sentinel auth-pass campus-redis $${REDIS_PASSWORD}
        sentinel down-after-milliseconds campus-redis 5000
        sentinel failover-timeout campus-redis 60000
        sentinel parallel-syncs campus-redis 1
        sentinel announce-ip $${HOST_IP}
        sentinel announce-port 26379
        EOF
        exec redis-sentinel "$$conf"
    environment:
      HOST_IP: ${HOST_IP:?HOST_IP is required}
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
    ports:
      - "${REDIS_SENTINEL_PORT:-26379}:26379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -p 26379 ping | grep -q PONG"]
      interval: 15s
      timeout: 5s
      retries: 5

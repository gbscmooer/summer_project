# Edge node (8 台方案): Caddy(TLS) + campus-web
# Gateway 改挂内网 SLB 后端（App-A/B），本机不再跑 campus-gateway。
# Web 通过 GATEWAY_UPSTREAM 反代到内网 SLB VIP；限流/登录特殊 location 仍在 nginx。
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

services:
  campus-web:
    logging: *default-logging
    read_only: true
    tmpfs:
      - /tmp
      - /var/cache/nginx:uid=101,gid=101,mode=0755
    security_opt: [no-new-privileges:true]
    cap_drop: [ALL]
    build: ../../campus-trade-web
    image: campus-web:multi-node
    container_name: campus-web
    environment:
      TRUSTED_PROXY_CIDR: ${TRUSTED_PROXY_CIDR:?TRUSTED_PROXY_CIDR is required}
      # 集群：http://<内网SLB_VIP>:8080；3 台同机验证可改回 http://campus-gateway:8080
      GATEWAY_UPSTREAM: ${GATEWAY_UPSTREAM:-http://campus-gateway:8080}
    # 仅本机回环，供同机 Caddy 反代；公网只暴露 Caddy 80/443
    ports:
      - "${WEB_BIND_ADDRESS:-127.0.0.1}:${WEB_PORT:-8080}:8080"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/ >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  caddy:
    logging: *default-logging
    image: caddy:2.9-alpine
    container_name: campus-caddy
    # host 网络：与 deploy/Caddyfile 一致，反代 127.0.0.1:8080；便于 ACME 与真实客户端 IP
    network_mode: host
    environment:
      DOMAIN: ${DOMAIN:-summer.huangzixuan.asia}
    volumes:
      - ./Caddyfile.cluster:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      campus-web:
        condition: service_healthy
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:

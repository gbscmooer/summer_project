worker_processes  auto;

error_log  /var/log/nginx/error.log notice;
pid        /tmp/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Only trust the explicitly configured LB/reverse-proxy source network.
    # This makes $binary_remote_addr represent the real client for rate limiting
    # without trusting arbitrary client-supplied X-Forwarded-For values.
    set_real_ip_from ${TRUSTED_PROXY_CIDR};
    real_ip_header X-Forwarded-For;
    real_ip_recursive on;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    keepalive_timeout  65;
    server_tokens off;
    limit_req_status 429;
    # 压测机放行：用 $realip_remote_addr（TCP 连接 IP），避免压测机落在
    # TRUSTED_PROXY_CIDR 内时被 real_ip 改写后 map 匹配失败。
    geo $realip_remote_addr $skip_api_limit {
        default          0;
        172.17.178.189   1;
    }
    map $skip_api_limit $api_limit_key {
        0 $binary_remote_addr;
        1 "";
    }
    geo $realip_remote_addr $skip_conn_limit {
        default          0;
        172.17.178.189   1;
    }
    map $skip_conn_limit $conn_limit_key {
        0 $binary_remote_addr;
        1 "";
    }
    # 压测机跳过登录/注册等 auth 限流，便于 JMeter 批量登录与秒杀上限测试
    geo $realip_remote_addr $skip_auth_limit {
        default          0;
        172.17.178.189   1;
    }
    map $skip_auth_limit $auth_limit_key {
        0 $binary_remote_addr;
        1 "";
    }
    limit_req_zone $api_limit_key zone=api_general:10m rate=30r/s;
    limit_req_zone $auth_limit_key zone=auth_strict:10m rate=5r/m;
    limit_req_zone $binary_remote_addr zone=ai_strict:10m rate=10r/m;
    limit_req_zone $binary_remote_addr zone=upload_strict:10m rate=6r/m;
    limit_conn_zone $conn_limit_key zone=per_ip:10m;

    server {
        listen       8080;
        server_name  localhost;
        client_max_body_size 40m;
        limit_conn per_ip 20;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header Content-Security-Policy "default-src 'self'; img-src 'self' data: blob: https:; style-src 'self' 'unsafe-inline'; script-src 'self'; connect-src 'self'; object-src 'none'; base-uri 'self'; frame-ancestors 'none'; form-action 'self'" always;

        # Serve static assets
        location / {
            root   /usr/share/nginx/html;
            index  index.html index.htm;
            # Support HTML5 History SPA routing
            try_files $uri $uri/ /index.html;
        }

        # Avoid stale index.html pointing at old hashed chunks
        location = /index.html {
            root   /usr/share/nginx/html;
            add_header Cache-Control "no-cache" always;
        }

        # Reverse Proxy to API Gateway (do not strip /api prefix).
        # GATEWAY_UPSTREAM defaults to http://campus-gateway:8080 (同机 Compose);
        # 集群边缘设为内网 SLB，例如 http://172.17.x.x:8080
        location /api/ {
            limit_req zone=api_general burst=60 nodelay;
            proxy_pass ${GATEWAY_UPSTREAM};
            proxy_connect_timeout 10s;
            proxy_read_timeout 95s;
            proxy_send_timeout 95s;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location = /api/user/login {
            limit_req zone=auth_strict burst=5 nodelay;
            client_max_body_size 16k;
            proxy_pass ${GATEWAY_UPSTREAM};
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location = /api/user/register {
            limit_req zone=auth_strict burst=3 nodelay;
            client_max_body_size 16k;
            proxy_pass ${GATEWAY_UPSTREAM};
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location = /api/user/forgot-password {
            limit_req zone=auth_strict burst=3 nodelay;
            client_max_body_size 16k;
            proxy_pass ${GATEWAY_UPSTREAM};
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location = /api/user/reset-password {
            limit_req zone=auth_strict burst=3 nodelay;
            client_max_body_size 16k;
            proxy_pass ${GATEWAY_UPSTREAM};
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location ^~ /api/ai/ {
            limit_req zone=ai_strict burst=5 nodelay;
            client_max_body_size 128k;
            proxy_pass ${GATEWAY_UPSTREAM};
            proxy_connect_timeout 10s;
            proxy_read_timeout 90s;
            proxy_send_timeout 90s;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location = /api/product/image/upload {
            limit_req zone=upload_strict burst=2 nodelay;
            client_max_body_size 40m;
            proxy_pass ${GATEWAY_UPSTREAM};
            proxy_connect_timeout 10s;
            proxy_read_timeout 30s;
            proxy_send_timeout 30s;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Redirect server error pages to /50x.html
        error_page   500 502 503 504  /50x.html;
        location = /50x.html {
            root   /usr/share/nginx/html;
        }
    }
}
